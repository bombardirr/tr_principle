# PR: build + test. Push / workflow_dispatch на main → деплой на self-hosted (мини-ПК).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

run-name: >-
  ${{ github.event_name == 'pull_request'
      && github.event.pull_request.title
      || github.event.head_commit.message
      || 'CI' }}

concurrency:
  group: appzac-${{ github.ref }}
  cancel-in-progress: ${{ !(github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')) }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: api/go.sum

      - name: API unit tests
        working-directory: api
        run: go test ./...

  deploy-prod:
    needs: [check]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: [self-hosted]
    environment: production
    steps:
      - name: prod — проверка каталога и git
        run: |
          set -euo pipefail
          ROOT=/home/ag/projects/tr_principle
          if [ ! -d "$ROOT" ]; then
            echo "::error::Нет каталога $ROOT на self-hosted runner (см. deploy/CURSOR_MINI_PC.txt)."
            exit 1
          fi
          cd "$ROOT"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: prod — проверка .env.prod
        working-directory: /home/ag/projects/tr_principle
        run: |
          set -euo pipefail
          if [ ! -f .env.prod ]; then
            echo "::error::На сервере нет .env.prod — скопируйте из .env.prod.example"
            exit 1
          fi
          TMP_ENV="$(mktemp)"
          sed '1s/^\xEF\xBB\xBF//' .env.prod | tr -d '\r' > "$TMP_ENV"
          for key in POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB DATABASE_URL JWT_SECRET CORS_ORIGIN METRICS_TOKEN GRAFANA_ADMIN_PASSWORD; do
            if ! grep -qE "^[[:space:]]*(export[[:space:]]+)?${key}[[:space:]]*=[[:space:]]*[^[:space:]#]" "$TMP_ENV"; then
              echo "::error::В .env.prod нужна непустая строка ${key}=... (см. .env.prod.example)."
              rm -f "$TMP_ENV"
              exit 1
            fi
          done
          if grep -qE "^[[:space:]]*(export[[:space:]]+)?METRICS_TOKEN[[:space:]]*=[[:space:]]*CHANGE_ME" "$TMP_ENV"; then
            echo "::error::METRICS_TOKEN всё ещё CHANGE_ME* — сгенерируйте: openssl rand -hex 32"
            rm -f "$TMP_ENV"
            exit 1
          fi
          if grep -qE "^[[:space:]]*(export[[:space:]]+)?GRAFANA_ADMIN_PASSWORD[[:space:]]*=[[:space:]]*CHANGE_ME" "$TMP_ENV"; then
            echo "::error::GRAFANA_ADMIN_PASSWORD всё ещё CHANGE_ME* — сгенерируйте: openssl rand -base64 24"
            rm -f "$TMP_ENV"
            exit 1
          fi
          rm -f "$TMP_ENV"

      - name: prod — сеть Docker
        run: docker network create proxy_net || true

      - name: prod — БД и ожидание pg_isready
        working-directory: /home/ag/projects/tr_principle
        run: |
          set -euo pipefail
          docker compose --env-file .env.prod -p appzac -f docker-compose.prod.yml up -d db
          for i in $(seq 1 45); do
            docker compose --env-file .env.prod -p appzac -f docker-compose.prod.yml exec -T db sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"' && break
            sleep 2
          done
          docker compose --env-file .env.prod -p appzac -f docker-compose.prod.yml exec -T db sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'

      - name: "prod — сборка и запуск (app: миграции + SPA)"
        working-directory: /home/ag/projects/tr_principle
        run: |
          set -euo pipefail
          docker compose --env-file .env.prod -p appzac -f docker-compose.prod.yml up -d --build --remove-orphans

      - name: "prod — healthcheck app"
        run: |
          set -euo pipefail
          for i in $(seq 1 45); do
            if docker exec appzac-prod-app wget -qO- http://127.0.0.1:8080/api/health >/dev/null 2>&1 \
              && docker exec appzac-prod-app wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "::error::appzac-prod-app не отвечает на :8080"
          docker compose --env-file /home/ag/projects/tr_principle/.env.prod -p appzac -f /home/ag/projects/tr_principle/docker-compose.prod.yml ps || true
          exit 1
