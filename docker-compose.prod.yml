# Прод на мини-ПК за NPM (как disput).
# Подготовка (один раз): docker network create proxy_net
#
# Рядом — .env.prod (не в git). См. .env.prod.example
#
# Порядок деплоя (как в CI): db → pg_isready → up --build (api мигрирует схему при старте) → web.
#
# NPM: Proxy Host → http://appzac-prod-web:80
#   (имя контейнера = ${STACK_NAME}-web, по умолчанию appzac-prod-web)

services:
  db:
    image: postgres:16-alpine
    container_name: ${STACK_NAME:-appzac-prod}-db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - appzac_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - default

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ${STACK_NAME:-appzac-prod}-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      HTTP_ADDR: ":8080"
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${STACK_NAME:-appzac-prod}-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - default
      - proxy_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy_net:
    external: true

volumes:
  appzac_pgdata:
