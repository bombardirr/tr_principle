# Прод на мини-ПК за NPM (как disput / peerling).
# Подготовка (один раз): docker network create proxy_net
#
# Рядом — .env.prod (не в git). См. .env.prod.example
#
# Порядок (как в CI): db → pg_isready → up --build (app мигрирует схему и отдаёт SPA).
#
# NPM: Proxy Host → http://appzac-prod-app:8080
#   (имя контейнера = ${STACK_NAME}-app). WebSockets не обязательны.
#
# Observability (Grafana public via NPM; Prometheus stays localhost-only):
#   Grafana  NPM → http://appzac-prod-grafana:3000  (https://grafana.appzac.ru)
#   Grafana  also 127.0.0.1:3000 (SSH fallback)
#   Prometheus http://127.0.0.1:9090 (SSH only — do not publish on NPM)
#   Требует METRICS_TOKEN + GRAFANA_ADMIN_PASSWORD + GRAFANA_ROOT_URL в .env.prod

services:
  db:
    image: postgres:16-alpine
    container_name: ${STACK_NAME:-appzac-prod}-db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - appzac_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - default

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GRAFANA_URL: ${GRAFANA_ROOT_URL:-https://grafana.appzac.ru}
        VITE_YANDEX_METRIKA_ID: ${VITE_YANDEX_METRIKA_ID:-}
    container_name: ${STACK_NAME:-appzac-prod}-app
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      HTTP_ADDR: ":8080"
      MIGRATIONS_DIR: /app/migrations
      PUBLIC_DIR: /app/public
      BACKUP_DIR: /data/backups
    volumes:
      - appzac_backups:/data/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 25s

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ${STACK_NAME:-appzac-prod}-node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    networks:
      - default
    # No published ports — scrape only from prometheus on the compose network.

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ${STACK_NAME:-appzac-prod}-prometheus
    restart: unless-stopped
    env_file:
      - .env.prod
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -z "$$METRICS_TOKEN" ]; then
          echo "METRICS_TOKEN is required for prometheus scrape" >&2
          exit 1
        fi
        printf '%s' "$$METRICS_TOKEN" > /tmp/bearer_token
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=$${PROMETHEUS_RETENTION:-15d} \
          --web.enable-lifecycle
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - appzac_prometheus:/prometheus
    depends_on:
      - app
      - node-exporter
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - default

  grafana:
    image: grafana/grafana:11.3.1
    container_name: ${STACK_NAME:-appzac-prod}-grafana
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.appzac.ru}
      GF_SERVER_DOMAIN: grafana.appzac.ru
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - appzac_grafana:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    ports:
      # Optional local/SSH access; public traffic goes via NPM → container:3000 on proxy_net
      - "127.0.0.1:3000:3000"
    networks:
      - default
      - proxy_net

networks:
  proxy_net:
    external: true

volumes:
  appzac_pgdata:
  appzac_backups:
  appzac_prometheus:
  appzac_grafana:
